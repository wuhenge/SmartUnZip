name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            cli_ext: .exe
            args: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            cli_ext: ''
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            cli_ext: ''
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            cli_ext: ''
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build --release -p smartunzip-cli ${{ matrix.args }}

      - name: Copy CLI for Tauri sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ -f target/release/smartunzip-cli.exe ]; then
            cp target/release/smartunzip-cli.exe src-tauri/binaries/smartunzip-cli-${{ matrix.target }}.exe
          elif [ -f target/${{ matrix.target }}/release/smartunzip-cli ]; then
            cp target/${{ matrix.target }}/release/smartunzip-cli src-tauri/binaries/smartunzip-cli-${{ matrix.target }}
          else
            cp target/release/smartunzip-cli src-tauri/binaries/smartunzip-cli-${{ matrix.target }}
          fi

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri
          args: ${{ matrix.args }}

      - name: Upload artifacts - Windows (NSIS)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: smartunzip-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload artifacts - Windows (MSI)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: smartunzip-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload artifacts - macOS (dmg)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: smartunzip-macos-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload artifacts - Linux (deb)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: smartunzip-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload artifacts - Linux (AppImage)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: smartunzip-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Create portable package - Windows
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $zipName = "smartunzip_${version}_x64_zh-CN_portable.zip"
          $tempDir = "src-tauri/target/release/portable"
          New-Item -ItemType Directory -Force -Path $tempDir
          Copy-Item "src-tauri/target/release/smartunzip.exe" "$tempDir/"
          Copy-Item "target/release/smartunzip-cli.exe" "$tempDir/"
          Compress-Archive -Path "$tempDir/*" -DestinationPath "src-tauri/target/release/$zipName"


      - name: Upload portable artifact - Windows
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: smartunzip-windows-portable
          path: src-tauri/target/release/*.zip
          if-no-files-found: warn


  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p ./release-files
          find ./artifacts -type f \( -name "*.msi" -o -name "*setup.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.zip" \) -exec cp {} ./release-files/ \;

      - name: Rename Windows files to Chinese
        shell: bash
        run: |
          cd release-files
          for f in *_x64_en-US*.msi; do
            [ -f "$f" ] && mv "$f" "${f//_x64_en-US/_x64_zh-CN}"
          done
          for f in *_x64-setup.exe; do
            [ -f "$f" ] && mv "$f" "${f//_x64-setup/_x64_zh-CN-setup}"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
