name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build CLI
        run: cargo build --release

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartunzip-cli
          path: target/release/smartunzip-cli.exe
          if-no-files-found: error

  build-gui:
    runs-on: windows-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: gui-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: smartunzip-cli
          path: src-tauri/binaries/

      - name: Rename CLI binary for Tauri
        run: |
          cd src-tauri/binaries
          if (Test-Path smartunzip-cli-x86_64-pc-windows-msvc.exe) { Remove-Item smartunzip-cli-x86_64-pc-windows-msvc.exe }
          Rename-Item smartunzip-cli.exe smartunzip-cli-x86_64-pc-windows-msvc.exe

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartunzip-gui
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  release:
    runs-on: windows-latest
    needs: [build-cli, build-gui]
    steps:
      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: smartunzip-cli
          path: ./artifacts/

      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: smartunzip-gui
          path: ./artifacts/



      - name: Generate checksums
        shell: pwsh
        run: |
          cd artifacts
          $files = Get-ChildItem -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          foreach ($file in $files) {
            $hash = Get-FileHash $file.FullName -Algorithm SHA256
            "$($hash.Hash)  $($file.Name)" | Out-File -Append checksums.txt
          }
          Get-Content checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.exe
            artifacts/*.msi
            artifacts/checksums.txt
          generate_release_notes: true
